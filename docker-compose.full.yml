services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aiteam-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiteam_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aiteam}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiteam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiteam-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: aiteam-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiteam}:${POSTGRES_PASSWORD:-aiteam_dev}@db:5432/${POSTGRES_DB:-aiteam}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AITEAM_ENV: ${AITEAM_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/app/.aiteam
      - ./plugin:/app/plugin:ro
      - ./hooks:/app/hooks:ro

volumes:
  pgdata:
  redisdata:
  appdata:
